server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed assets for 1 year (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html and env.js (must always be fresh)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: all unmatched routes return index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
